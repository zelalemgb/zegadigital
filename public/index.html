<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Zega Digital вАФ Bot Tester</title>
<style>
  :root {
    --header: #202c33; --in-bubble: #202c33; --out-bubble: #005c4b;
    --text: #e9edef; --muted: #8696a0; --accent: #00a884; --chat-bg: #0b141a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #000; color: var(--text); display: flex; justify-content: center; }
  .phone { width: 100%; max-width: 460px; height: 100vh; display: flex; flex-direction: column;
    background: var(--chat-bg); }
  header { background: var(--header); padding: 10px 14px; display: flex; align-items: center; gap: 12px; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: #008f72;
    display: flex; align-items: center; justify-content: center; font-size: 19px; }
  .title { font-weight: 600; font-size: 15px; }
  .subtitle { font-size: 12px; color: var(--muted); }
  .spacer { flex: 1; }
  .btn { background: transparent; border: 1px solid var(--muted); color: var(--muted);
    border-radius: 6px; padding: 5px 9px; font-size: 12px; cursor: pointer; }
  .btn:hover { color: var(--text); border-color: var(--text); }
  .stats { background: #182229; color: var(--text); font-size: 12.5px; padding: 7px 14px;
    display: flex; gap: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .stats b { font-weight: 600; }
  .chat { flex: 1; overflow-y: auto; padding: 14px 12px 6px; display: flex; flex-direction: column; gap: 6px; }
  .row { display: flex; }
  .row.in { justify-content: flex-start; }
  .row.out { justify-content: flex-end; }
  .bubble { max-width: 84%; padding: 7px 10px 8px; border-radius: 8px; font-size: 14.5px;
    line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }
  .in .bubble { background: var(--in-bubble); border-top-left-radius: 2px; }
  .out .bubble { background: var(--out-bubble); border-top-right-radius: 2px; }
  .bubble .meta { font-size: 10px; color: var(--muted); text-align: right; margin-top: 2px; }
  .reward .bubble { background: #1f3d2f; border: 1px solid #2e6b4f; }
  .typing { color: var(--muted); font-size: 13px; padding: 2px 6px; }
  .bimg { width: 100%; border-radius: 6px; margin-bottom: 6px; display: block; }
  .ic { display: inline-block; width: 1.05em; height: 1.05em; vertical-align: -0.16em; opacity: 0.9; }
  .num { display: inline-flex; align-items: center; justify-content: center; min-width: 1.15em; height: 1.15em;
    padding: 0 0.25em; margin-right: 1px; border-radius: 4px; background: rgba(255,255,255,0.10);
    font-size: 0.82em; font-weight: 500; vertical-align: 1px; }
  .quickbar { display: flex; flex-direction: column; gap: 6px; padding: 8px 10px 4px; background: #111b21;
    border-top: 1px solid rgba(255,255,255,0.05); min-height: 14px; max-height: 230px; overflow-y: auto; }
  .rbtn { width: 100%; text-align: center; color: var(--accent); background: var(--header); border: none;
    border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 500; cursor: pointer; }
  .rbtn:hover { background: #2a3942; }
  .lrow { width: 100%; display: flex; justify-content: space-between; align-items: center; background: var(--header);
    border: none; border-radius: 8px; padding: 11px 12px; color: var(--text); font-size: 14px; cursor: pointer; }
  .lrow:hover { background: #2a3942; }
  .lrow .chev { color: var(--muted); font-size: 16px; }
  .listcap { color: var(--muted); font-size: 11px; padding: 2px 4px; }
  .composer { display: flex; gap: 8px; padding: 8px 10px 12px; background: #111b21; }
  .composer input { flex: 1; border: none; outline: none; border-radius: 20px; padding: 11px 14px;
    font-size: 15px; background: var(--header); color: var(--text); }
  .composer button { border: none; background: var(--accent); color: #04231c; width: 44px; height: 44px;
    border-radius: 50%; font-size: 18px; cursor: pointer; }
</style>
</head>
<body>
  <div class="phone">
    <header>
      <div class="avatar">рЯ§Ц</div>
      <div>
        <div class="title">Zega Digital бЛЬбМЛ бЛ≤бМВбЙ≥бИН</div>
        <div class="subtitle" id="status">online</div>
      </div>
      <div class="spacer"></div>
      <button class="btn" id="nudge" title="Preview the proactive reminder this user would receive">рЯФФ Nudge</button>
      <button class="btn" id="nextday" title="Simulate the next calendar day (to test streaks)">пЉЛ Day</button>
      <button class="btn" id="reset">Restart</button>
    </header>

    <div class="stats" id="stats">
      <span id="st-level">рЯМ± Curious</span>
      <span id="st-xp">0 XP</span>
      <span id="st-streak">рЯФ• 0</span>
      <span id="st-badges">рЯПЕ 0</span>
    </div>

    <div class="chat" id="chat"></div>
    <div class="quickbar" id="quickbar"></div>

    <div class="composer">
      <input id="input" type="text" placeholder="Type a messageвА¶" autocomplete="off" />
      <button id="send" title="Send">вЮ§</button>
    </div>
  </div>

<script>
  // Stable per-browser user id so progress persists across reloads.
  let userId = localStorage.getItem('zega_uid');
  if (!userId) { userId = 'web-' + Math.random().toString(36).slice(2, 10); localStorage.setItem('zega_uid', userId); }
  let dayOffset = parseInt(localStorage.getItem('zega_day_offset') || '0', 10);

  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const statusEl = document.getElementById('status');
  const quickbar = document.getElementById('quickbar');

  function todayStr() {
    const d = new Date(); d.setDate(d.getDate() + dayOffset);
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }
  function escapeHtml(s) { return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }

  // Load the monoline icon sprite so <use href="#ic-вА¶"> resolves.
  const spriteReady = fetch('/icons.svg').then(r => r.text())
    .then(t => document.body.insertAdjacentHTML('afterbegin', t)).catch(() => {});

  // Map the bot's emojis to the custom minimal icon set. Anything not mapped is
  // stripped, so messages stay clean and consistent instead of emoji-heavy.
  const EMOJI_MAP = {
    'рЯ§Ц':'robot','рЯСЛ':'wave','рЯТ°':'bulb','рЯІ≠':'compass','рЯП†':'home','рЯУЛ':'list','рЯЧТпЄП':'list',
    'вЭМ':'x','вЬЕ':'check','вЬФпЄП':'check','рЯФЩ':'arrow-left','вЮ°пЄП':'arrow-right','вЦґпЄП':'play',
    'рЯМН':'globe','рЯМР':'globe','вДєпЄП':'info','рЯУЦ':'book','рЯУЪ':'book','рЯЖШ':'help',
    'рЯІТ':'user','рЯІС':'user','рЯС§':'user','рЯС©вАНрЯПЂ':'user','рЯС®вАНрЯС©вАНрЯСІ':'users','рЯС©вАНрЯС©вАНрЯСІвАНрЯС¶':'users','рЯ§Э':'users',
    'рЯФР':'lock','рЯФТ':'lock','рЯФС':'key','рЯЫ°пЄП':'shield','рЯЫ°':'shield','вЪ†пЄП':'warning','рЯЪ®':'warning',
    'рЯО£':'hook','рЯТЪ':'heart','вЭ§пЄП':'heart','рЯТЩ':'heart','рЯТї':'screen','рЯЦ•пЄП':'screen','рЯУ±':'phone',
    'рЯІ†':'quiz','рЯ§Ф':'quiz','вЭУ':'quiz','в≠Р':'star','рЯМЯ':'star','вЬ®':'star',
    'рЯФ•':'flame','рЯПЕ':'award','рЯОЦпЄП':'award','рЯПЖ':'award','рЯОЙ':'celebrate','рЯ•З':'award',
    'рЯМ±':'sprout','рЯФ∞':'sprout','рЯ•И':'shield','рЯОУ':'award','рЯУИ':'trending-up','рЯУК':'chart',
    'рЯФФ':'bell','рЯФХ':'bell-off','рЯОѓ':'target','рЯУМ':'pin','рЯСА':'eye','рЯСБпЄП':'eye',
    'рЯЪЂ':'ban','вЫФ':'ban','рЯЪ©':'flag','вП±пЄП':'clock','вП∞':'clock','рЯХР':'clock','рЯТђ':'chat',
    'рЯФО':'search','рЯФН':'search','рЯХµпЄП':'search','вЪЩпЄП':'gear','рЯН™':'cookie','рЯ™™':'id','рЯЖФ':'id',
    'рЯУЄ':'camera','рЯУЈ':'camera','вЬНпЄП':'write','рЯЪА':'rocket','рЯІ©':'check','рЯЩИ':'eye','рЯТѓ':'award',
    'рЯЫС':'ban','рЯШґ':'chat','рЯ™Ю':'user','рЯС¶':'user','рЯСІ':'user','рЯПЈпЄП':'pin','рЯ§µ':'user','рЯ§°':'robot',
    'рЯУ©':'chat','рЯУµ':'phone','рЯО®':'star','рЯЦМпЄП':'write','рЯ™Д':'star','рЯМА':'compass','рЯФЃ':'star',
    'рЯІ∞':'gear','рЯІР':'eye','рЯ™І':'flag','рЯТЉ':'screen','рЯП•':'shield','рЯП¶':'lock','рЯТ≥':'lock',
    'рЯФЧ':'globe','вЩїпЄП':'arrow-right','рЯФБ':'arrow-right','рЯФД':'arrow-right','рЯУЮ':'phone','рЯУІ':'chat',
    'рЯ§Ђ':'lock','рЯХґпЄП':'eye','рЯУП':'list','рЯФ°':'list','рЯФҐ':'list','вЭЧ':'warning','рЯШ†':'warning',
    'вЫУпЄП':'lock','рЯУ≤':'phone','рЯ¶Є':'shield','рЯ¶†':'warning','рЯХµпЄПвАНвЩВпЄП':'search','рЯТА':'warning','рЯО≠':'eye',
    'рЯОµ':'play','рЯОђ':'play','рЯЦЉпЄП':'camera','рЯУЭ':'write','рЯША':'chat','рЯТ≠':'chat','вЪЦпЄП':'shield',
    'рЯУЬ':'book','рЯЩП':'users','рЯУҐ':'bell','рЯЂІ':'cookie','рЯЯҐ':'check','рЯЯ°':'warning','рЯФі':'ban',
    'рЯЪ¶':'warning','рЯРЊ':'search','вШҐпЄП':'warning','рЯЯ©':'check','рЯПФпЄП':'flame','вЪ°':'flame','рЯПБ':'flag',
    'рЯТ™':'award','рЯ§Ц':'robot','рЯФ§':'list','рЯОЫпЄП':'gear','рЯС®вАНрЯС©вАНрЯСІвАНрЯС¶':'users','рЯТ∞':'lock','рЯХЙпЄП':'globe',
    'рЯСН':'check','рЯ§µ':'user','рЯПҐ':'screen','рЯІСвАНрЯТї':'user','рЯІСвАНрЯПЂ':'user','рЯЧЇпЄП':'globe','рЯІЧ':'trending-up',
    'рЯПЧпЄП':'gear','рЯЪІ':'gear','рЯ™™':'id','рЯІЊ':'list','вђЗпЄП':'arrow-right','рЯУґ':'phone','рЯЯ†':'warning'
  };
  function iconHtml(name) { return '<svg class="ic" aria-hidden="true"><use href="#ic-' + name + '"></use></svg>'; }
  function iconize(html) {
    for (const e in EMOJI_MAP) { if (html.indexOf(e) >= 0) html = html.split(e).join(iconHtml(EMOJI_MAP[e])); }
    html = html.replace(/([0-9])пЄП?вГ£/g, '<span class="num">$1</span>').replace(/\u{1F51F}/gu, '<span class="num">10</span>');
    // Strip any remaining emoji / variation selectors / joiners.
    html = html.replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{2300}-\u{23FF}\u{2B00}-\u{2BFF}\u{2190}-\u{21FF}\u{FE00}-\u{FE0F}\u{200D}\u{20E3}\u{2122}\u{2139}]/gu, '');
    return html;
  }
  function format(t) { return iconize(escapeHtml(t).replace(/\*(.+?)\*/g, '<strong>$1</strong>').replace(/_(.+?)_/g, '<em>$1</em>')); }
  function nowTime() { const d = new Date(); return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); }

  function isReward(t) { return /^(в≠Р|рЯПЕ|рЯОЙ|рЯФ•)/.test(t); }
  function addBubble(msg, side) {
    const obj = typeof msg === 'object' && msg !== null ? msg : { text: String(msg) };
    const text = obj.text || '';
    const row = document.createElement('div');
    row.className = 'row ' + side + (side === 'in' && isReward(text) ? ' reward' : '');
    const img = obj.image ? '<img class="bimg" src="' + obj.image + '" alt="">' : '';
    row.innerHTML = '<div class="bubble">' + img + format(text) +
      '<div class="meta">' + nowTime() + (side === 'out' ? ' вЬУвЬУ' : '') + '</div></div>';
    chat.appendChild(row); chat.scrollTop = chat.scrollHeight;
  }
  function showTyping() { const t = document.createElement('div'); t.className = 'typing'; t.id = 'typing'; t.textContent = 'Zega is typingвА¶'; chat.appendChild(t); chat.scrollTop = chat.scrollHeight; }
  function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

  function updateStats(p) {
    if (!p) return;
    const levelIcons = ['sprout','user','shield','shield-check','award'];
    document.getElementById('st-level').innerHTML = iconHtml(levelIcons[p.levelIndex] || 'sprout') + ' ' + escapeHtml(p.level);
    document.getElementById('st-xp').innerHTML = iconHtml('star') + ' ' + p.xp + ' XP';
    document.getElementById('st-streak').innerHTML = iconHtml('flame') + ' ' + p.streak;
    document.getElementById('st-badges').innerHTML = iconHtml('award') + ' ' + p.badges;
  }
  function renderActions(actions, style) {
    quickbar.innerHTML = '';
    if (!actions || !actions.length) return;
    if (style === 'list') {
      const cap = document.createElement('div'); cap.className = 'listcap'; cap.textContent = 'Tap to choose';
      quickbar.appendChild(cap);
      actions.forEach(a => {
        const r = document.createElement('button'); r.className = 'lrow';
        r.innerHTML = '<span>' + iconize(escapeHtml(a.label)) + '</span><span class="chev">вАЇ</span>';
        r.onclick = () => sendText(a.value);
        quickbar.appendChild(r);
      });
    } else {
      actions.forEach(a => {
        const b = document.createElement('button'); b.className = 'rbtn';
        b.innerHTML = iconize(escapeHtml(a.label));
        b.onclick = () => sendText(a.value);
        quickbar.appendChild(b);
      });
    }
  }

  async function post(url, body) {
    const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }
  async function renderBot(data, instant) {
    const msgs = data.messages || [];
    for (const m of msgs) {
      const len = (m && m.text ? m.text.length : 20);
      if (!instant) { showTyping(); await new Promise(res => setTimeout(res, 280 + Math.min(600, len * 3))); hideTyping(); }
      addBubble(m, 'in');
    }
    updateStats(data.profile);
    renderActions(data.actions, data.actionStyle);
  }

  async function start() {
    await spriteReady;
    chat.innerHTML = ''; statusEl.textContent = 'connectingвА¶';
    for (let i = 0; i < 5; i++) {
      try { const data = await post('/api/start', { userId, today: todayStr() }); statusEl.textContent = 'online'; await renderBot(data, true); return; }
      catch (e) { await new Promise(res => setTimeout(res, 500)); }
    }
    statusEl.textContent = 'offline';
    addBubble('вЪ†пЄП Could not reach the bot server. Make sure `npm run tester` is running, then tap Restart.', 'in');
  }
  async function sendText(text) {
    if (!String(text).trim()) return;
    addBubble(text, 'out'); input.value = '';
    try { const data = await post('/api/message', { userId, text, today: todayStr() }); await renderBot(data); }
    catch (e) { hideTyping(); addBubble('вЪ†пЄП Message failed to send. Try again.', 'in'); }
  }

  document.getElementById('send').onclick = () => sendText(input.value);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendText(input.value); });
  document.getElementById('reset').onclick = start;
  document.getElementById('nextday').onclick = () => {
    dayOffset += 1; localStorage.setItem('zega_day_offset', String(dayOffset));
    statusEl.textContent = 'simulating day +' + dayOffset;
    sendText('MENU');
  };
  document.getElementById('nudge').onclick = async () => {
    try {
      const n = await post('/api/nudge', { userId });
      addBubble('рЯФФ ' + n.message, 'in');         // arrives like a push reminder
      if (n.button) renderActions([n.button]);     // one-tap "Continue learning"
    } catch (e) { addBubble('вЪ†пЄП Could not build a nudge.', 'in'); }
  };

  start();
</script>
</body>
</html>
