<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- Bundled fonts so lesson cards render identically on any host (Render's
       Linux box has no Ethiopic font of its own). Resolved relative to this
       file so it works regardless of the deploy path. -->
  <dir prefix="relative">.</dir>
  <cachedir>/tmp/zega-fontconfig</cachedir>

  <!-- Any generic sans request falls through to our bundled faces: Latin from
       DejaVu Sans, Ethiopic from Noto Sans Ethiopic. -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>DejaVu Sans</family>
      <family>Noto Sans Ethiopic</family>
    </prefer>
  </alias>
  <alias>
    <family>DejaVu Sans</family>
    <accept><family>Noto Sans Ethiopic</family></accept>
  </alias>
</fontconfig>
