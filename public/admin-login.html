<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Sign in — Zega Digital Dashboard</title>
<link rel="icon" type="image/png" href="/assets/favicon-32.png" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: radial-gradient(120% 120% at 80% -10%, #4a6fc0 0%, #345aa0 45%, #1c3660 100%);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #12152b; padding: 24px;
  }
  .card {
    background: #fff; width: 100%; max-width: 380px; border-radius: 20px; padding: 30px 28px;
    box-shadow: 0 30px 70px rgba(19,15,60,.4);
  }
  .brand { margin-bottom: 22px; }
  .brand img { height: 46px; width: auto; display: block; }
  h1 { font-size: 20px; margin: 0 0 4px; letter-spacing: -0.02em; }
  p.sub { margin: 0 0 20px; color: #6b7280; font-size: 14px; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  input[type=password] {
    width: 100%; font: inherit; padding: 12px 14px; border: 1px solid #e2e5ee; border-radius: 11px;
    outline: none; transition: border-color .15s, box-shadow .15s;
  }
  input[type=password]:focus { border-color: #345aa0; box-shadow: 0 0 0 3px rgba(52,90,160,.18); }
  button {
    width: 100%; font: inherit; font-weight: 700; color: #fff; border: 0; cursor: pointer;
    margin-top: 16px; padding: 13px; border-radius: 12px;
    background: linear-gradient(135deg, #3a5fa8, #26436f); box-shadow: 0 10px 24px rgba(52,90,160,.32);
  }
  button:active { transform: translateY(1px); }
  .err { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 10px 12px;
    border-radius: 10px; font-size: 13.5px; margin-bottom: 16px; }
  .foot { margin-top: 18px; text-align: center; font-size: 13px; }
  .foot a { color: #6b7280; text-decoration: none; }
  .foot a:hover { color: #12152b; }
</style>
</head>
<body>
  <form class="card" method="post" action="/admin/login">
    <div class="brand">
      <img src="/img/zega-logo.png" alt="ZEGA — My Digital World Ethiopia" />
    </div>
    <h1>Sign in</h1>
    <p class="sub">Enter the dashboard password to continue.</p>
    <div class="err" id="err" hidden>Incorrect password. Please try again.</div>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" autofocus required />
    <button type="submit">Sign in →</button>
    <div class="foot"><a href="/">← Back to home</a></div>
  </form>
  <script>
    if (new URLSearchParams(location.search).has("e")) {
      document.getElementById("err").hidden = false;
      history.replaceState(null, "", "/admin/login"); // clean the ?e=1 from the URL
    }
  </script>
</body>
</html>
